        cat > "app/src/main/java/com/example/smsspend/SpendingWidget.kt" <<'__SMS_EOF_4__'
        package com.example.smsspend

        import android.app.PendingIntent
        import android.appwidget.AppWidgetManager
        import android.appwidget.AppWidgetProvider
        import android.content.Context
        import android.content.Intent
        import android.widget.RemoteViews

        class SpendingWidget : AppWidgetProvider() {
            override fun onUpdate(c: Context, mgr: AppWidgetManager, ids: IntArray) {
                for (id in ids) render(c, mgr, id)
            }

            companion object {
                fun render(c: Context, mgr: AppWidgetManager, id: Int) {
                    val (total, text) = Store.summary(c)
                    val rv = RemoteViews(c.packageName, R.layout.widget_spending)
                    rv.setTextViewText(R.id.w_total, total)
                    rv.setTextViewText(R.id.w_text, text)
                    val pi = PendingIntent.getActivity(
                        c, 0, Intent(c, MainActivity::class.java),
                        PendingIntent.FLAG_IMMUTABLE
                    )
                    rv.setOnClickPendingIntent(R.id.w_root, pi)
                    mgr.updateAppWidget(id, rv)
                }
            }
        }
        __SMS_EOF_4__
        mkdir -p "app/src/main/java/com/example/smsspend"
        cat > "app/src/main/java/com/example/smsspend/Store.kt" <<'__SMS_EOF_5__'
        package com.example.smsspend

        import android.content.Context
        import org.json.JSONObject

        object Store {
            private const val P = "smsspend"

            fun overrides(c: Context): MutableMap<String, String> {
                val s = c.getSharedPreferences(P, 0).getString("ov", "{}")!!
                val o = JSONObject(s)
                val m = HashMap<String, String>()
                for (k in o.keys()) m[k] = o.getString(k)
                return m
            }

            fun setOverride(c: Context, key: String, cat: String) {
                val m = overrides(c)
                m[key] = cat
                val o = JSONObject()
                for ((k, v) in m) o.put(k, v)
                c.getSharedPreferences(P, 0).edit().putString("ov", o.toString()).apply()
            }

            fun saveSummary(c: Context, text: String, total: String) {
                c.getSharedPreferences(P, 0).edit()
                    .putString("wtext", text).putString("wtotal", total).apply()
            }

            fun summary(c: Context): Pair<String, String> {
                val sp = c.getSharedPreferences(P, 0)
                return Pair(sp.getString("wtotal", "—")!!, sp.getString("wtext", "Open app to load")!!)
            }
        }
